<div class="container">
  <h2>Studenti</h2>
  <input class="search-box" [(ngModel)]="searchTerm" placeholder="🔍 Pretraži po imenu, indeksu ili emailu..." />
  <button *ngIf="authService.isAdmin()" (click)="openForm()">+ Dodaj studenta</button>

  <div *ngIf="showForm" class="form-card">
    <h3>{{ editingId ? 'Izmeni' : 'Dodaj' }} studenta</h3>
    <input [(ngModel)]="form.indexNo" placeholder="Broj indeksa" />
    <input [(ngModel)]="form.name" placeholder="Ime i prezime" />
    <input [(ngModel)]="form.email" placeholder="Email" />
    <input *ngIf="!editingId" [(ngModel)]="form.password" type="password" placeholder="Lozinka" />
    <select [(ngModel)]="form.status">
      <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
    </select>
    <select [(ngModel)]="form.programId">
      <option value="">-- Odaberi program --</option>
      <option *ngFor="let p of programs" [value]="p.id">{{ p.name }}</option>
    </select>
    <button (click)="save()">Sačuvaj</button>
    <button (click)="showForm = false">Otkaži</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Indeks</th>
        <th>Ime</th>
        <th>Email</th>
        <th>Status</th>
        <th>Program</th>
        <th>Akcije</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of filteredStudents">
        <td>{{ s.indexNo }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.email }}</td>
        <td>{{ s.status }}</td>
        <td>{{ getProgramName(s.programId) }}</td>
        <td>
          <button *ngIf="authService.isAdmin()" (click)="openForm(s)">Izmeni</button>
          <button *ngIf="authService.isAdmin()" (click)="delete(s.id)">Obriši</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
