<div class="container">
  <h2>Zaposleni</h2>
  <button *ngIf="authService.isAdmin()" (click)="openForm()">+ Dodaj zaposlenog</button>

  <div *ngIf="showForm" class="form-card">
    <h3>{{ editingId ? 'Izmeni' : 'Dodaj' }} zaposlenog</h3>
    <input [(ngModel)]="form.fullName" placeholder="Ime i prezime" />
    <select [(ngModel)]="form.role">
      <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
    </select>
    <input [(ngModel)]="form.email" placeholder="Email" />
    <input *ngIf="!editingId" [(ngModel)]="form.password" type="password" placeholder="Lozinka" />
    <button (click)="save()">Sačuvaj</button>
    <button (click)="showForm = false">Otkaži</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Ime i prezime</th>
        <th>Uloga</th>
        <th>Email</th>
        <th>Akcije</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let e of employees">
        <td>{{ e.fullName }}</td>
        <td>{{ e.role }}</td>
        <td>{{ e.email }}</td>
        <td>
          <button *ngIf="authService.isAdmin()" (click)="openForm(e)">Izmeni</button>
          <button *ngIf="authService.isAdmin()" (click)="delete(e.id)">Obriši</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
