<div class="container">
  <h2>Predmeti</h2>
<button *ngIf="authService.isAdmin()" (click)="openForm()">+ Dodaj predmet</button>

  <div *ngIf="showForm" class="form-card">
    <h3>{{ editingId ? 'Izmeni' : 'Dodaj' }} predmet</h3>
    <input [(ngModel)]="form.code" placeholder="Šifra predmeta" />
    <input [(ngModel)]="form.name" placeholder="Naziv predmeta" />
    <input [(ngModel)]="form.ects" type="number" placeholder="ECTS bodovi" />
    <select [(ngModel)]="form.programId">
      <option value="">-- Odaberi program --</option>
      <option *ngFor="let p of programs" [value]="p.id">{{ p.name }}</option>
    </select>
    <button (click)="save()">Sačuvaj</button>
    <button (click)="showForm = false">Otkaži</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Šifra</th>
        <th>Naziv</th>
        <th>ECTS</th>
      <th *ngIf="!authService.isStudent()">Program</th>
      <th *ngIf="authService.isStudent()">Ocena</th>
      <th *ngIf="authService.isAdmin()">Akcije</th>
      </tr>
    </thead>
    <tbody>
  <tr *ngFor="let c of courses">
      <td>{{ c.code }}</td>
      <td>{{ c.name }}</td>
      <td>{{ c.ects }}</td>
      <td *ngIf="!authService.isStudent()">{{ getProgramName(c.programId) }}</td>
      <td *ngIf="authService.isStudent()">
        <span *ngIf="c.grade" class="grade-badge passed">{{ c.grade }} (Položen)</span>
        <span *ngIf="!c.grade" class="grade-badge pending">Nije položen</span>
      </td>
      <td *ngIf="authService.isAdmin()">
        <button (click)="openForm(c)">Izmeni</button>
        <button (click)="delete(c.id)">Obriši</button>
      </td>
    </tr>
    </tbody>
  </table>
</div>
