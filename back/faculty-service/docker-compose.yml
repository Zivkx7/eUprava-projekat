services:
  mysql:
    image: mysql:8.0
    container_name: fakultet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fakultet_db
      MYSQL_USER: fakultet_user
      MYSQL_PASSWORD: fakultet1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: